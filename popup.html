<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blocked</title>
    <link rel="stylesheet" href="popup.css">
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
    <div id="popup">
        <img id="current-favicon" alt="">
        <h2 id="current-website"></h2>
        <button id="block-btn">Block this site</button>
        <div class="action-row">
            <button id="edit-btn" class="icon-action" title="Edit block list">
                <i class="fa-solid fa-list-check"></i>
                <span>List</span>
            </button>
            <button id="focus" class="icon-action" title="Focus mode">
                <i class="fa-solid fa-stopwatch"></i>
                <span>Focus</span>
            </button>
            <button id="schedule-btn" class="icon-action" title="Schedule">
                <i class="fa-solid fa-calendar-days"></i>
                <span>Schedule</span>
            </button>
        </div>
    </div>

    <div id="block-popup">
        <h1>Website blocked</h1>
        <button id="unblock-btn">Unblock</button>
    </div>

    <div id="unavailable-popup">
        <h1>Not available on this page</h1>
    </div>

    <div id="edit-list-popup">
        <header class="popup-header">
            <button id="back-btn" class="back-btn" aria-label="Back" type="button">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <h1>Edit Block List</h1>
        </header>
        <div id="search-wrap">
            <input id="search-input" type="text" placeholder="Add a website..." autocomplete="off">
            <ul id="search-suggestions"></ul>
        </div>
        <ul id="block-list">

        </ul>
    </div>
    
    <div id="focus-popup">
        <header class="popup-header">
            <button id="back-btn2" class="back-btn" aria-label="Back" type="button">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <h1>Focus Mode</h1>
        </header>
        <div id="focus-body">
            
            <div class="focus-item">
                <h3>Focus Time</h3>
                <div>
                    <input id="focus-input" type="number" step="1" min="1" value="5">
                    <p>Minutes</p>
                </div>
            </div>
            <div class="focus-item">
                <h3>Break Time</h3>
                <div>
                    <input id="break-input" type="number" step="1" min="1" max="60" value="10">
                    <p>Minutes</p>
                </div>
            </div>

            <div class="focus-item">
                <h3>Num of Cycles</h3>
                <div>
                    <input id="cycles-input" type="number" step="1" min="1" max="5" value="1">
                    <p>Cycles</p>
                </div>
            </div>
               
           
            <button id="session-btn">Start Session</button>
        </div>
    </div>
        
    <div id="schedule-popup">
        <header class="popup-header">
            <button id="back-btn3" class="back-btn" aria-label="Back" type="button">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <h1>Schedule</h1>
        </header>
        <div id="schedule-body">
            <label class="schedule-toggle">
                <input id="schedule-enabled" type="checkbox">
                <span>Enable schedule</span>
            </label>
            <p class="schedule-hint">Sites marked "Scheduled" are blocked only during these hours. "Always" sites stay blocked.</p>
            <div id="schedule-days">
                <button type="button" class="day-pill" data-day="0">S</button>
                <button type="button" class="day-pill" data-day="1">M</button>
                <button type="button" class="day-pill" data-day="2">T</button>
                <button type="button" class="day-pill" data-day="3">W</button>
                <button type="button" class="day-pill" data-day="4">T</button>
                <button type="button" class="day-pill" data-day="5">F</button>
                <button type="button" class="day-pill" data-day="6">S</button>
            </div>
            <div class="schedule-times">
                <div class="time-field">
                    <label for="schedule-start">Start</label>
                    <input id="schedule-start" type="time" value="09:00">
                </div>
                <div class="time-field">
                    <label for="schedule-end">End</label>
                    <input id="schedule-end" type="time" value="17:00">
                </div>
            </div>
            <button id="schedule-save">Save</button>
            <p id="schedule-status"></p>
        </div>
    </div>

    <div id="timer-popup">
        <h2 id="timer-mode">Focus Time</h2>
        <div class="timer-container">
            <div class="semicircle"></div>
            <div class="semicircle"></div>
            <div class="semicircle"></div>
            <div class="outermost-circle"></div>

            <div class="clock-container">
                <div class="clock"></div>
            </div>
        </div>

    

        <div class="timer-btns">
            <button id="reset-btn">Reset</button>
            <button id="pause-btn">Pause</button>
            <button id="resume-btn">Resume</button>
        </div>
    </div>

    <script src="popup.js" type="module"></script>
</body>
</html>
