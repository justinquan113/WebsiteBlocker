<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blocked</title>
    <link rel="stylesheet" href="blocked.css">
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="card">
        <div class="badge">
            <div class="badge-tile" id="badge-tile">
                <img class="site-favicon" id="site-favicon" alt="">
                <div class="badge-fallback"></div>
            </div>
        </div>
        <h1 class="site-name" id="site-name">This site</h1>
        <p class="reason">This site is on your blocked list.</p>
        <p class="subtitle">Take a breath and come back when you're ready to focus.</p>
        <p class="quote">"Discipline is choosing between what you want now and what you want most."</p>
    </div>

    <script src="blocked.js"></script>
</body>
</html>
